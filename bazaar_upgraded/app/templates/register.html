{% extends "base.html" %}
{% block title %}Register — Bazaar@IITGN{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Join Bazaar@IITGN</h2>
    <p class="auth-sub">Only <strong>@iitgn.ac.in</strong> emails are accepted</p>

    <form method="POST">
      <div class="form-section-title">Account</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>IITGN Email</label>
        <input type="email" name="email" required placeholder="yourname@iitgn.ac.in" />
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" name="phone" placeholder="10-digit mobile" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required minlength="6" placeholder="Min 6 chars" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required placeholder="Repeat password" />
        </div>
      </div>

      <div class="form-section-title">Location (for item pickup)</div>
      <div class="form-row">
        <div class="form-group">
          <label>Hostel</label>
          <select name="hostel">
            <option value="">— Select hostel —</option>
            {% for h in hostels %}
            <option value="{{ h }}">{{ h }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Wing</label>
          <select name="wing">
            <option value="">— Select wing —</option>
            {% for w in wings %}
            <option value="{{ w }}">Wing {{ w }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-section-title">Academic Info (optional)</div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <input type="text" name="department" placeholder="e.g. Computer Science" />
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" name="year" min="1" max="6" placeholder="1–6" />
        </div>
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" name="roll_number" placeholder="e.g. 21110xxx" />
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-footer">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
